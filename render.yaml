services:
  - type: web
    name: sold-data-dashboard
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node --experimental-sqlite server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: USERS
        value: admin:admin123:admin
      - key: DB_PATH
        value: /tmp/sheet.db
